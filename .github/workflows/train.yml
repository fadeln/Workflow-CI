name: Train Horse vs Human Model

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/modelling.py'
      - 'MLProject/conda.yaml'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install numpy pillow scikit-learn mlflow

      - name: Train model with MLflow
        run: mlflow run . --no-conda
